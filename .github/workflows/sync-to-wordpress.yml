name: Sync to WordPress

on:
  push:
    branches: [ main ]
    paths:
      - 'content/posts/**'
  workflow_dispatch:  # 允许手动触发

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true  # 取消正在运行的旧工作流，只执行最新的

permissions:
  issues: write

jobs:
  sync-posts:
    runs-on: ubuntu-latest
    
    # 防循环检查：跳过自动化提交和特定标记的提交
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[bot]') &&
      !contains(github.event.head_commit.message, 'skip ci')
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取完整历史用于git diff
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests markdown
    
    - name: Detect changed posts
      id: detect
      run: |
        # 获取变更的文章目录
        echo "开始检测变更的文章..."
        
        # 获取上一次提交和当前提交
        if [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
          BEFORE_COMMIT="${{ github.event.before }}"
        else
          # 如果是第一次提交或强制推送，比较所有文件
          BEFORE_COMMIT=$(git rev-list --max-parents=0 HEAD)
        fi
        
        CURRENT_COMMIT="${{ github.sha }}"
        
        echo "比较范围: $BEFORE_COMMIT..$CURRENT_COMMIT"
        
        # 获取变更的Markdown文件
        CHANGED_FILES=$(git -c core.quotePath=false diff --name-only $BEFORE_COMMIT $CURRENT_COMMIT -- "content/posts/" 2>/dev/null || echo "")
        
        if [ -z "$CHANGED_FILES" ]; then
          echo "没有检测到文章变更"
          echo "changed=" >> $GITHUB_OUTPUT
          echo "count=0" >> $GITHUB_OUTPUT
        else
          # 提取文章slug（目录名）
          SLUGS=$(echo "$CHANGED_FILES" | grep -E 'content/posts/[^/]+/index\.md$' | xargs -I{} dirname {} | xargs -I{} basename {} | sort -u)
          
          if [ -z "$SLUGS" ]; then
            echo "没有检测到文章变更（只有其他文件变更）"
            echo "changed=" >> $GITHUB_OUTPUT
            echo "count=0" >> $GITHUB_OUTPUT
          else
            COUNT=$(echo "$SLUGS" | wc -w | tr -d ' ')
            echo "检测到变更的文章 ($COUNT 篇): $SLUGS"
            echo "changed=$(echo $SLUGS | tr ' ' ',')" >> $GITHUB_OUTPUT
            echo "count=$COUNT" >> $GITHUB_OUTPUT
          fi
        fi
    
    - name: Restore sync hashes cache
      uses: actions/cache@v4
      with:
        path: .sync-hashes.json
        key: sync-hashes-${{ github.run_id }}
        restore-keys: |
          sync-hashes-

    - name: Run sync script
      id: sync
      env:
        WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
        WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
        WORDPRESS_PASSWORD: ${{ secrets.WORDPRESS_PASSWORD }}
      run: |
        CHANGED="${{ steps.detect.outputs.changed }}"
        EVENT="${{ github.event_name }}"

        if [ -z "$CHANGED" ] && [ "$EVENT" != "workflow_dispatch" ]; then
          echo "没有需要同步的文章，跳过"
          echo "result=skipped" >> $GITHUB_OUTPUT
        else
          # Build command arguments
          SYNC_ARGS="--hashes-file .sync-hashes.json"
          if [ -n "$CHANGED" ]; then
            echo "开始同步文章: $CHANGED"
            echo "文章数量: ${{ steps.detect.outputs.count }}"
            SYNC_ARGS="$SYNC_ARGS --slugs $CHANGED"
          else
            echo "手动触发：同步全部文章（哈希缓存自动跳过未变化的）"
          fi

          # Capture exit code without set -e killing the script
          SYNC_EXIT_CODE=0
          timeout 300 python scripts/sync_posts_enhanced.py $SYNC_ARGS \
            || SYNC_EXIT_CODE=$?

          if [ $SYNC_EXIT_CODE -eq 0 ]; then
            echo "同步成功"
            echo "result=success" >> $GITHUB_OUTPUT
          elif [ $SYNC_EXIT_CODE -eq 124 ]; then
            echo "同步超时（5分钟）"
            echo "result=timeout" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "同步失败，退出码: $SYNC_EXIT_CODE"
            echo "result=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
        fi
    
    - name: Create issue on failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          // 获取失败的slug
          const changed = '${{ steps.detect.outputs.changed }}';
          const slugs = changed ? changed.split(',') : [];
          const count = '${{ steps.detect.outputs.count }}' || '0';
          const result = '${{ steps.sync.outputs.result }}';
          
          // 创建issue
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `WordPress同步失败: ${count}篇文章同步失败 (${result})`,
            body: "## WordPress文章同步失败报告\n\n**触发时间**: " + new Date().toISOString() + "\n**触发提交**: " + context.sha + "\n**失败文章**: " + (slugs.join(', ') || '未知') + "\n**同步结果**: " + result + "\n**文章数量**: " + count + "\n\n### 可能的原因\n1. WordPress API连接失败\n2. 文章格式错误\n3. 权限不足\n4. 网络问题\n5. 同步超时（5分钟）\n\n### 下一步操作\n1. 检查WordPress API配置\n2. 验证文章格式是否正确\n3. 手动重试同步\n4. 检查网络连接\n\n### 相关链接\n- 工作流运行: " + context.serverUrl + "/" + context.repo.owner + "/" + context.repo.repo + "/actions/runs/" + context.runId + "\n- 提交详情: " + context.serverUrl + "/" + context.repo.owner + "/" + context.repo.repo + "/commit/" + context.sha,
          });
    
    - name: Send success notification
      if: success()
      run: |
        echo "✅ WordPress同步成功"
        echo "变更的文章: ${{ steps.detect.outputs.changed }}"
        echo "文章数量: ${{ steps.detect.outputs.count }}"
        
        # 记录成功日志
        echo "--- 同步成功日志 ---" >> sync-success.log
        echo "时间: $(date)" >> sync-success.log
        echo "提交: ${{ github.sha }}" >> sync-success.log
        echo "文章: ${{ steps.detect.outputs.changed }}" >> sync-success.log
        echo "数量: ${{ steps.detect.outputs.count }}" >> sync-success.log
        echo "-------------------" >> sync-success.log